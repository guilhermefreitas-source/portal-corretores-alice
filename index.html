<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal dos Corretores Â· Alice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root {
  --deep:#40002d; --mag:#be0380; --mag-l:rgba(190,3,128,0.08); --mag-m:rgba(190,3,128,0.15);
  --bg:#f3f2f0; --surf:#fff; --surf2:#faf9f7;
  --bd:#ece9e2; --bd2:#dbd7d0;
  --tx:#1a1a18; --txs:#5c5b57; --txm:#9a9894;
  --gr:#2a6e0f; --gr-bg:#e8f5e0;
  --am:#7a4e00; --am-bg:#fdf3e0;
  --re:#a02020; --re-bg:#fceaea;
  --r:6px; --rm:10px; --rl:14px;
  --sh:0 8px 32px rgba(64,0,45,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;}
.page{max-width:960px;margin:0 auto;padding:24px 16px 48px;}
.topbar{background:var(--deep);border-radius:var(--rl) var(--rl) 0 0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:10px;color:#f3f2f0;font-size:15px;font-weight:600;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:var(--mag);box-shadow:0 0 8px var(--mag);}
.topbar-user{font-size:12px;color:rgba(243,242,240,0.5);display:flex;align-items:center;gap:6px;}
.topbar-av{width:26px;height:26px;border-radius:50%;background:rgba(190,3,128,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#f3f2f0;}
.portal{background:var(--surf);border-radius:0 0 var(--rl) var(--rl);box-shadow:var(--sh);overflow:hidden;}
.modes{display:flex;background:var(--surf2);border-bottom:1px solid var(--bd);padding:0 28px;}
.mbtn{padding:14px 0;margin-right:28px;font-size:13px;font-weight:500;color:var(--txm);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color .15s;}
.mbtn.active{color:var(--mag);border-bottom-color:var(--mag);font-weight:600;}
.swrap{padding:20px 28px;border-bottom:1px solid var(--bd);background:var(--surf2);}
.srow{display:flex;gap:8px;}
.sfield{flex:1;padding:10px 14px;border:1.5px solid var(--bd2);border-radius:var(--rm);font-size:14px;font-family:inherit;background:var(--surf);color:var(--tx);transition:border-color .15s;}
.sfield:focus{outline:none;border-color:var(--mag);}
.sfield::placeholder{color:var(--txm);}
.sbtn{padding:10px 22px;background:var(--mag);color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
.sbtn:hover{background:#a3026e;}
.sbtn:disabled{background:var(--txm);cursor:not-allowed;}
.errbar{display:none;margin:12px 28px 0;padding:11px 14px;background:var(--re-bg);border:1px solid #f3c6c6;border-radius:var(--rm);font-size:13px;color:var(--re);}
.loading{display:none;padding:52px;text-align:center;color:var(--txm);font-size:13px;}
.loading.on{display:block;}
.empty{padding:64px 28px;text-align:center;}
.empty-ico{font-size:32px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:600;color:var(--txs);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--txm);}
.rarea{display:none;padding:0;}
/* HEADER RESULTADO */
.rheader{display:flex;align-items:center;gap:14px;padding:20px 28px 16px;border-bottom:1px solid var(--bd);}
.rav{width:44px;height:44px;border-radius:var(--rm);background:var(--mag-m);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--mag);flex-shrink:0;}
.rnome{font-size:16px;font-weight:700;color:var(--deep);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rmeta{font-size:12px;color:var(--txm);margin-top:2px;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.tag-tier{background:var(--mag-l);color:var(--mag);}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 28px;background:var(--surf2);}
.tbtn{padding:12px 0;margin-right:24px;font-size:12px;font-weight:500;color:var(--txm);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.tbtn.active{color:var(--mag);border-bottom-color:var(--mag);font-weight:600;}
.tpane{display:none;padding:20px 28px;}
.tpane.active{display:block;}
/* RESUMO */
.r-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--bd);}
.r-av2{width:52px;height:52px;border-radius:var(--rm);background:var(--mag-m);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--mag);flex-shrink:0;}
.r-title{font-size:17px;font-weight:700;color:var(--deep);}
.r-sub{font-size:12px;color:var(--txm);margin-top:3px;display:flex;align-items:center;gap:6px;}
.tier-badge{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;}
.tier-Magenta{background:#fce8f3;color:#c2185b;}
.tier-Ouro{background:#fff8e1;color:#f57f17;}
.tier-Prata{background:#f5f5f5;color:#616161;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.metric{background:var(--surf2);border:1px solid var(--bd);border-radius:var(--rm);padding:12px 14px;}
.metric-val{font-size:20px;font-weight:700;color:var(--deep);}
.metric-val.m{color:var(--mag);}
.metric-lbl{font-size:10px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.r-section{margin-bottom:16px;}
.r-stitle{font-size:10px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f2ee;}
.r-row:last-child{border-bottom:none;}
.r-lbl{font-size:12px;color:var(--txm);}
.r-val{font-size:12px;font-weight:600;color:var(--tx);}
.r-val.ok{color:#1a9e5c;}
.r-val.warn{color:#e6a817;}
.r-val.na{color:var(--txm);font-weight:400;}
.r-alert{background:var(--am-bg);border:1px solid #ffe082;border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--am);margin-bottom:6px;}
/* AGENTES */
.agent-card{background:var(--surf2);border:1px solid var(--bd);border-radius:var(--rm);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.agent-av{width:34px;height:34px;border-radius:50%;background:var(--mag-m);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mag);flex-shrink:0;}
.agent-name{font-size:13px;font-weight:600;color:var(--tx);}
.agent-firm{font-size:11px;color:var(--txm);}
.agent-cpf{font-size:11px;color:var(--txm);background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:2px 6px;white-space:nowrap;}
/* TABELA */
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end;}
.flbl{font-size:11px;font-weight:600;color:var(--txm);display:block;margin-bottom:4px;}
.finput{padding:7px 10px;border:1.5px solid var(--bd2);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--surf);}
.finput:focus{outline:none;border-color:var(--mag);}
select.finput{min-width:120px;}
.fcount{font-size:12px;color:var(--txm);margin-left:auto;align-self:center;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--deep);color:rgba(255,255,255,0.85);font-weight:600;font-size:11px;text-align:left;padding:10px 12px;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
tr:hover td{background:var(--mag-l);}
tr.hidden{display:none;}
.val{font-weight:600;}
.muted{color:var(--txs);}
.badge{display:inline-flex;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.b-ok{background:var(--gr-bg);color:var(--gr);}
.b-pend{background:var(--am-bg);color:var(--am);}
.b-miss{background:var(--re-bg);color:var(--re);}
.dbtn{background:none;border:none;cursor:pointer;color:var(--mag);font-size:14px;padding:2px 6px;border-radius:var(--r);}
.dbtn:hover{background:var(--mag-l);}
/* PDF */
.pfilters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.pfbtn{padding:6px 14px;border:1.5px solid var(--bd2);border-radius:999px;font-size:12px;font-weight:500;background:var(--surf);cursor:pointer;transition:all .15s;}
.pfbtn.active{background:var(--mag);color:#fff;border-color:var(--mag);}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.pcard{background:var(--surf2);border:1px solid var(--bd);border-radius:var(--rm);padding:14px;display:flex;flex-direction:column;gap:8px;}
.pcard-name{font-size:11px;font-weight:600;color:var(--tx);line-height:1.4;word-break:break-word;}
.pcard-meta{font-size:10px;color:var(--txm);}
.pcard-link{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--deep);color:#fff;border-radius:var(--r);font-size:11px;font-weight:600;text-decoration:none;margin-top:auto;}
.pcard-link:hover{background:var(--mag);}
.pempty{padding:32px;text-align:center;color:var(--txm);font-size:13px;}
/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(30,0,20,0.45);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.moverlay.open{display:flex;}
.modal{background:var(--surf);border-radius:var(--rl);box-shadow:0 16px 48px rgba(64,0,45,0.18);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--surf);}
.mtitle{font-size:15px;font-weight:700;color:var(--deep);}
.msub{font-size:11px;color:var(--txm);margin-top:2px;}
.mclose{background:none;border:none;cursor:pointer;font-size:20px;color:var(--txm);padding:4px 8px;line-height:1;border-radius:var(--r);}
.mclose:hover{background:var(--mag-l);color:var(--mag);}
.mbody{padding:18px 22px 22px;}
.msection{margin-bottom:18px;}
.mstitle{font-size:10px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mfield{display:flex;flex-direction:column;gap:3px;}
.mfield.full{grid-column:1/-1;}
.mflbl{font-size:10px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.04em;}
.mfval{font-size:13px;color:var(--tx);font-weight:500;word-break:break-word;}
.mfval.big{font-size:16px;font-weight:700;color:var(--mag);}
.mnotes{background:var(--am-bg);border-left:3px solid #e6a817;padding:10px 12px;border-radius:var(--r);font-size:12px;color:var(--am);margin-top:8px;}
.src-badge{display:inline-flex;align-items:center;gap:4px;margin-top:14px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600;background:rgba(64,0,45,0.05);color:var(--txm);}
@media(max-width:600px){.r-grid{grid-template-columns:1fr;}.mgrid{grid-template-columns:1fr;}.metrics{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-brand"><div class="topbar-dot"></div>Portal dos Corretores</div>
    <div class="topbar-user"><div class="topbar-av">AS</div>Revenue Â· Alice SaĂşde</div>
  </div>
  <div class="portal">
    <div class="modes">
      <button class="mbtn active" onclick="setMode('corretora',this)">Corretora</button>
      <button class="mbtn" onclick="setMode('empresa',this)">Empresa</button>
    </div>
    <div class="swrap">
      <div class="srow">
        <input class="sfield" id="sinput" type="text" autocomplete="off"
               placeholder="CNPJ da corretora â€” ex: 00469777000108"
               onkeydown="if(event.key==='Enter')buscar()">
        <button class="sbtn" id="sbtn" onclick="buscar()">Buscar</button>
      </div>
    </div>
    <div class="errbar" id="errbar"></div>
    <div class="loading" id="loading">đź”Ť Buscando dadosâ€¦</div>

    <div class="empty" id="empty">
      <div class="empty-ico">đź”Ť</div>
      <div class="empty-title" id="empty-title">Busque uma corretora pelo CNPJ</div>
      <div class="empty-sub">Digite o CNPJ e clique em Buscar</div>
    </div>

    <div class="rarea" id="rarea">
      <div class="rheader">
        <div class="rav" id="rav">--</div>
        <div>
          <div class="rnome" id="rnome">â€”</div>
          <div class="rmeta" id="rmeta">â€”</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tbtn active" onclick="showTab('resumo',this)">đź“‹ Resumo</button>
        <button class="tbtn" onclick="showTab('historico',this)">đź“Š HistĂłrico <span id="cnt-hist" style="background:var(--mag-l);color:var(--mag);padding:1px 6px;border-radius:999px;font-size:10px;margin-left:4px;"></span></button>
        <button class="tbtn" onclick="showTab('comprovantes',this)">đź“„ Comprovantes <span id="cnt-pdf" style="background:var(--mag-l);color:var(--mag);padding:1px 6px;border-radius:999px;font-size:10px;margin-left:4px;"></span></button>
      </div>

      <!-- ABA RESUMO -->
      <div class="tpane active" id="tab-resumo">
        <div id="resumo-content"></div>
        <span class="src-badge">đź“Š Metabase Â· member_lifecycle</span>
      </div>

      <!-- ABA HISTĂ“RICO -->
      <div class="tpane" id="tab-historico">
        <div class="frow">
          <div><label class="flbl">De</label><input class="finput" id="fde" type="date"></div>
          <div><label class="flbl">AtĂ©</label><input class="finput" id="fate" type="date"></div>
          <div><label class="flbl">Status</label>
            <select class="finput" id="fstatus">
              <option value="">Todos</option>
              <option value="VĂˇlido">VĂˇlido</option>
              <option value="Pago">Pago</option>
              <option value="Pendente">Pendente</option>
            </select>
          </div>
          <div><label class="flbl">Origem</label>
            <select class="finput" id="forigem"><option value="">Todas</option></select>
          </div>
          <button class="sbtn" style="padding:7px 14px;font-size:12px;align-self:flex-end;" onclick="filtrar()">Filtrar</button>
          <button class="sbtn" style="padding:7px 14px;font-size:12px;align-self:flex-end;background:var(--surf2);color:var(--txm);border:1.5px solid var(--bd2);" onclick="limparFiltros()">Limpar</button>
          <span class="fcount" id="fcount"></span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>ReferĂŞncia</th><th>PerĂ­odo</th><th>Empresa</th>
                <th>Valor total</th><th>Valor NF</th><th>Origem</th>
                <th>Tier</th><th>Status</th><th>Pago em</th><th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- ABA COMPROVANTES -->
      <div class="tpane" id="tab-comprovantes">
        <div class="pfilters" id="pfilters">
          <button class="pfbtn active" onclick="filtrarPDF('TODOS',this)">Todos</button>
          <button class="pfbtn" onclick="filtrarPDF('ALICE',this)">Alice</button>
          <button class="pfbtn" onclick="filtrarPDF('DUQUESA',this)">Duquesa</button>
        </div>
        <div class="pgrid" id="pgrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="moverlay" id="moverlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="mhead">
      <div>
        <div class="mtitle" id="mtitle">Detalhe</div>
        <div class="msub" id="msub"></div>
      </div>
      <button class="mclose" onclick="fecharModal()">âś•</button>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script>
const API = 'https://alice-sandbox.app.n8n.cloud/webhook/corretoras';
let modo='corretora', dados=[], pdfsData=[], agentesData=[], resumoData={}, cadastroData={};
const $=id=>document.getElementById(id);
const brl=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const dt=d=>{if(!d||d.startsWith('0001'))return'â€”';try{return new Date(d.slice(0,10)+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;}};
const mes=d=>{if(!d||d.startsWith('0001'))return'â€”';try{return new Date(d.slice(0,10)+'T12:00:00').toLocaleDateString('pt-BR',{month:'short',year:'numeric'});}catch{return d;}};

function setMode(m,el){
  modo=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  $('sinput').placeholder=m==='corretora'?'CNPJ da corretora â€” ex: 00469777000108':'CNPJ da empresa â€” ex: 22600635000162';
  $('empty-title').textContent=m==='corretora'?'Busque uma corretora pelo CNPJ':'Busque uma empresa pelo CNPJ';
  $('rarea').style.display='none';
  $('empty').style.display='block';
  $('errbar').style.display='none';
  $('sinput').value='';
}

async function buscar(){
  const raw=$('sinput').value.trim();
  const cnpj=raw.replace(/\D/g,'');
  if(!cnpj){$('errbar').textContent='Digite o CNPJ.';$('errbar').style.display='block';return;}
  $('empty').style.display='none';
  $('rarea').style.display='none';
  $('errbar').style.display='none';
  $('loading').classList.add('on');
  $('sbtn').disabled=true;
  const param=modo==='corretora'?`cnpj=${cnpj}`:`company_cnpj=${cnpj}`;
  try{
    const resp=await fetch(`${API}?${param}`,{method:'GET',mode:'cors',headers:{'Accept':'application/json'}});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const json=await resp.json();
    let pags,arqs,ags,res;
    if(Array.isArray(json)&&json[0]?.pagamentos){
      pags=json[0].pagamentos; arqs=json[0].pdfs||[]; ags=json[0].agentes||[]; res=json[0].resumo||{};
    } else {
      pags=Array.isArray(json)?json:[]; arqs=[]; ags=[]; res={};
    }
    $('loading').classList.remove('on');
    $('sbtn').disabled=false;
    if(!pags||!pags.length){
      $('errbar').textContent=`Nenhum registro encontrado para ${cnpj}.`;
      $('errbar').style.display='block';
      return;
    }
    dados=pags; pdfsData=arqs; agentesData=ags; resumoData=res;
    render(pags,arqs,ags,res,json[0].cadastro||{},cnpj);
  }catch(e){
    $('loading').classList.remove('on');
    $('sbtn').disabled=false;
    $('errbar').textContent='Erro ao buscar: '+e.message;
    $('errbar').style.display='block';
  }
}

function render(pags,arqs,ags,res,cad,cnpj){
  const p=pags[0]||{};
  const nome=modo==='corretora'?(p.sales_firm_name||cnpj):(p.company_legal_name||cnpj);
  const tierVal=p.sales_firm_tier||'';
  $('rav').textContent=nome.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'--';
  $('rnome').innerHTML=nome+(tierVal?` <span class="tag tag-tier">${tierVal}</span>`:'');
  $('rmeta').textContent=`CNPJ: ${p.sales_firm_cnpj||p.company_cnpj||cnpj} Â· ${pags.length} registros`;

  // --- RESUMO ---
  const temRes=res&&res.sales_firm_name;
  const nomeCor=temRes?(res.sales_firm_legal_name||res.sales_firm_name):(p.sales_firm_name||cnpj||'â€”');
  const tierCor=temRes?res.sales_firm_tier:(p.sales_firm_tier||'');
  const ini=nomeCor.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'--';
  const totVal=pags.reduce((s,d)=>s+(d.sales_firm_total_payment_amount||0),0);
  const totNF=pags.reduce((s,d)=>s+(d.invoice_amount||0),0);
  const totOk=pags.filter(d=>['Pago','VĂˇlido'].includes(d.payment_status)).length;
  const totPend=pags.filter(d=>d.payment_status&&!['Pago','VĂˇlido'].includes(d.payment_status)).length;
  const emps=[...new Set(pags.map(d=>d.company_cnpj).filter(Boolean))].length;
  const pers=[...new Set(pags.map(d=>d.payment_period).filter(Boolean))].length;
  const fee=temRes&&res.agency_fee?`${res.agency_fee}%`:'â€”';
  const lfe=temRes&&res.lifetime_fee?`${(res.lifetime_fee*100).toFixed(1)}%`:'â€”';
  const pix=temRes&&res.pix_key?`${res.pix_key_type||'PIX'}: ${res.pix_key}`:null;
  const banco=temRes&&res.bank_name?`${res.bank_name} Â· Ag ${res.bank_agency||'â€”'} Â· CC ${res.bank_account||'â€”'}`:null;

  $('resumo-content').innerHTML=`
    <div class="r-header">
      <div class="r-av2">${ini}</div>
      <div>
        <div class="r-title">${nomeCor}</div>
        <div class="r-sub">
          CNPJ: ${temRes?res.sales_firm_cnpj:(p.sales_firm_cnpj||cnpj||'â€”')}
          ${tierCor?`<span class="tier-badge tier-${tierCor}">${tierCor}</span>`:''}
        </div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-val m">${pags.length}</div><div class="metric-lbl">Pagamentos</div></div>
      ${modo==='corretora'?`
        <div class="metric"><div class="metric-val">${emps}</div><div class="metric-lbl">Empresas</div></div>
        <div class="metric"><div class="metric-val">${temRes&&res.vidas_ativas?res.vidas_ativas.toLocaleString('pt-BR'):'â€”'}</div><div class="metric-lbl">Vidas ativas</div></div>
      `:`<div class="metric"><div class="metric-val">${emps||1}</div><div class="metric-lbl">Empresa(s)</div></div>`}
      <div class="metric"><div class="metric-val m">${brl(totVal)}</div><div class="metric-lbl">Total comissĂµes</div></div>
      <div class="metric"><div class="metric-val">${brl(totNF)}</div><div class="metric-lbl">Total NF</div></div>
    </div>
    <div class="r-grid">
      <div>
        <div class="r-section">
          <div class="r-stitle">đź“Š Status dos pagamentos</div>
          <div class="r-row"><span class="r-lbl">Total apuraĂ§Ăµes</span><span class="r-val">${pags.length}</span></div>
          <div class="r-row"><span class="r-lbl">VĂˇlidos</span><span class="r-val ok">${totOk}</span></div>
          <div class="r-row"><span class="r-lbl">Pendentes</span><span class="r-val ${totPend>0?'warn':'ok'}">${totPend}</span></div>
          <div class="r-row"><span class="r-lbl">PerĂ­odos cobertos</span><span class="r-val">${pers}</span></div>
          ${temRes&&res.ultimo_periodo?`<div class="r-row"><span class="r-lbl">Ăšltimo perĂ­odo</span><span class="r-val">${res.ultimo_periodo}</span></div>`:''}
        </div>
        <div class="r-section">
          <div class="r-stitle">đź’° Estrutura de comissĂŁo</div>
          <div class="r-row"><span class="r-lbl">Agency fee</span><span class="r-val">${fee}</span></div>
          <div class="r-row"><span class="r-lbl">Lifetime fee</span><span class="r-val">${lfe}</span></div>
        </div>
      </div>
      <div>
        <div class="r-section">
          <div class="r-stitle">đźŹ¦ Dados de pagamento</div>
          ${cad&&cad.sales_firm_email&&cad.sales_firm_email!=='-'?`<div class="r-row"><span class="r-lbl">đź“§ Email recebedor</span><span class="r-val" style="color:var(--mag)">${cad.sales_firm_email}</span></div>`:`<div class="r-alert">âš ď¸Ź Email nĂŁo cadastrado</div>`}
          ${cad&&cad.sales_firm_phone_number&&cad.sales_firm_phone_number!=='-'?`<div class="r-row"><span class="r-lbl">đź“ž Telefone</span><span class="r-val">${cad.sales_firm_phone_number}</span></div>`:''}
          ${pix?`<div class="r-row"><span class="r-lbl">PIX</span><span class="r-val" style="color:var(--mag);word-break:break-all">${pix}</span></div>`:`<div class="r-alert">âš ď¸Ź PIX nĂŁo cadastrado</div>`}
          ${banco?`<div class="r-row"><span class="r-lbl">Banco</span><span class="r-val">${banco}</span></div>`:(!pix?`<div class="r-alert">âš ď¸Ź Dados bancĂˇrios nĂŁo cadastrados</div>`:'')}
        </div>
        ${ags&&ags.length?`
        <div class="r-section">
          <div class="r-stitle">đź‘¤ Agentes vinculados</div>
          ${ags.map(a=>`
            <div class="agent-card">
              <div class="agent-av">${(a.sales_agent_name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
              <div style="flex:1"><div class="agent-name">${a.sales_agent_name||'â€”'}</div><div class="agent-firm">${a.sales_firm_name||'â€”'}</div></div>
              ${a.sales_agent_document?`<span class="agent-cpf">CPF: ${a.sales_agent_document}</span>`:''}
            </div>`).join('')}
        </div>`:''}
        ${arqs.length?`
        <div class="r-section">
          <div class="r-stitle">đź“„ Comprovantes</div>
          <div class="r-row"><span class="r-lbl">PDFs no Drive</span><span class="r-val ok">${arqs.length} arquivos</span></div>
        </div>`:''}
      </div>
    </div>`;

  // --- HISTĂ“RICO ---
  const origens=[...new Set(pags.map(d=>d.record_source).filter(Boolean))];
  $('forigem').innerHTML='<option value="">Todas</option>'+origens.map(o=>`<option value="${o}">${o}</option>`).join('');
  ['fde','fate','fstatus','forigem'].forEach(id=>$(id).value='');
  renderTabela(pags);

  // --- COMPROVANTES ---
  renderPDFs(arqs,'TODOS');

  // Counters
  $('cnt-hist').textContent=pags.length;
  $('cnt-pdf').textContent=arqs.length;

  $('rarea').style.display='block';
  showTab('resumo',document.querySelector('.tbtn'));
}

function renderTabela(pags){
  $('fcount').textContent=pags.length+' registros';
  $('tbody').innerHTML=pags.map((d,i)=>{
    const st=d.payment_status;
    const bc=st==='Pago'?'b-ok':st?'b-pend':'b-miss';
    const bt=['Pago','VĂˇlido'].includes(st)?'âś“ '+st:st||'âś— Pendente';
    const ref=d.invoice_group_reference_month||d.invoice_group_paid_at||'';
    return `<tr data-ref="${ref.slice(0,10)}" data-status="${st||''}" data-origem="${d.record_source||''}">
      <td class="val">${mes(ref)}</td>
      <td class="muted" style="font-size:11px">${d.payment_period||'â€”'}</td>
      <td class="muted" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.company_legal_name||''}">${d.company_legal_name||'â€”'}</td>
      <td class="val">${brl(d.sales_firm_total_payment_amount)}</td>
      <td class="muted">${d.invoice_amount?brl(d.invoice_amount):'â€”'}</td>
      <td class="muted">${d.record_source||'â€”'}</td>
      <td>${d.sales_firm_tier?`<span class="tag tag-tier" style="font-size:10px">${d.sales_firm_tier}</span>`:'â€”'}</td>
      <td><span class="badge ${bc}">${bt}</span></td>
      <td class="muted">${dt(d.invoice_group_paid_at)}</td>
      <td><button class="dbtn" onclick="abrirDetalhe(${i})" title="Ver detalhes">đź”Ť</button></td>
    </tr>`;
  }).join('');
}

function renderPDFs(arqs,filtro){
  document.querySelectorAll('.pfbtn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===(filtro==='TODOS'?'Todos':filtro));
  });
  const sub=filtro==='TODOS'?arqs:arqs.filter(p=>p.origem===filtro);
  if(!sub.length){$('pgrid').innerHTML='<div class="pempty">Nenhum comprovante encontrado.</div>';return;}
  $('pgrid').innerHTML=sub.map(p=>`
    <div class="pcard">
      <div class="pcard-name">${p.nome}</div>
      <div class="pcard-meta">${p.data?'đź“… '+p.data:''} Â· ${p.origem}</div>
      <a class="pcard-link" href="${p.link}" target="_blank">Abrir PDF â†—</a>
    </div>`).join('');
}

function filtrarPDF(f,el){renderPDFs(pdfsData,f);}

function filtrar(){
  const de=$('fde').value, ate=$('fate').value, st=$('fstatus').value, org=$('forigem').value;
  document.querySelectorAll('#tbody tr').forEach(row=>{
    const ref=row.dataset.ref, status=row.dataset.status, origem=row.dataset.origem;
    let ok=true;
    if(de&&ref&&ref<de) ok=false;
    if(ate&&ref&&ref>ate) ok=false;
    if(st&&status!==st) ok=false;
    if(org&&origem!==org) ok=false;
    row.classList.toggle('hidden',!ok);
  });
  const vis=document.querySelectorAll('#tbody tr:not(.hidden)').length;
  $('fcount').textContent=vis+' registros';
}

function limparFiltros(){
  ['fde','fate','fstatus','forigem'].forEach(id=>$(id).value='');
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('hidden'));
  $('fcount').textContent=dados.length+' registros';
}

function showTab(id,el){
  document.querySelectorAll('.tpane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  $('tab-'+id).classList.add('active');
  if(el)el.classList.add('active');
}

function abrirDetalhe(i){
  const d=dados[i]; if(!d)return;
  const fmtD=s=>{if(!s||s==='None'||s===null)return'â€”';try{const dt=new Date(s);return isNaN(dt)?s:dt.toLocaleDateString('pt-BR');}catch{return s;}};
  const fmtBRL2=v=>{if(v==null||v==='')return'â€”';return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});};
  const fmtFac=v=>{if(v==null||v==='')return'â€”';return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});};
  const val=v=>(v==null||v===''||v==='None')?'â€”':v;
  const st=d.payment_status;
  const bc=['Pago','VĂˇlido'].includes(st)?'b-ok':st?'b-pend':'b-miss';
  const bt=['Pago','VĂˇlido'].includes(st)?'âś“ '+st:st||'âś— Pendente';
  const agenteName=d.sales_agent_name||null;
  const agenteCPF=d.sales_agent_document||null;
  $('mtitle').textContent='Detalhe do Pagamento';
  $('msub').textContent=`Adjusted ID: ${d.adjusted_id||'â€”'} Â· Sheets ID: ${d.sheets_id||'â€”'}`;

  const row=(lbl,v,extra)=>`
    <div class="r-row">
      <span class="r-lbl">${lbl}</span>
      <span class="r-val">${extra?v:(typeof v==='string'&&v.startsWith('<')?v:val(v))}</span>
    </div>`;

  $('mbody').innerHTML=`
    <div class="msection">
      <div class="mstitle">đź“‹ Dados do pagamento</div>
      ${row('payment_period', d.payment_period)}
      ${row('sales_firm_cnpj', d.sales_firm_cnpj)}
      ${row('sales_firm_name', d.sales_firm_name)}
      ${row('sales_firm_tier', d.sales_firm_tier?`<span class="badge b-ok">${d.sales_firm_tier}</span>`:'')}
      ${row('membership_activated_at', fmtD(d.membership_activated_at))}
      ${row('deal_contract_code', d.deal_contract_code)}
      ${row('company_cnpj', d.company_cnpj)}
      ${row('company_legal_name', d.company_legal_name)}
      ${row('invoice_group_rank', d.invoice_group_rank!=null?'Parcela '+d.invoice_group_rank:null)}
      ${row('invoice_group_reference_month', fmtD(d.invoice_group_reference_month))}
      ${row('invoice_group_paid_at', fmtD(d.invoice_group_paid_at))}
      ${row('invoice_amount', fmtBRL2(d.invoice_amount))}
      ${row('payment_factor', fmtFac(d.payment_factor))}
      ${row('sales_firm_total_payment_amount', fmtBRL2(d.sales_firm_total_payment_amount))}
      ${row('payment_status', `<span class="badge ${bc}">${bt}</span>`, true)}
      ${row('notes', d.notes)}
      ${row('record_source', d.record_source)}
      ${row('internal_notes', d.internal_notes)}
      ${row('payment_type', d.payment_type)}
    </div>
    ${agenteName?`
    <div class="msection">
      <div class="mstitle">đź‘¤ Corretor que fez a venda</div>
      <div class="agent-card">
        <div class="agent-av">${agenteName.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}</div>
        <div style="flex:1">
          <div class="agent-name">${agenteName}</div>
          <div class="agent-firm">${d.sales_firm_name||'â€”'}</div>
        </div>
        ${agenteCPF?`<span class="agent-cpf">CPF: ${agenteCPF}</span>`:''}
      </div>
    </div>`:`
    <div class="msection">
      <div class="mstitle">đź‘¤ Corretor que fez a venda</div>
      <div class="r-alert">Agente nĂŁo identificado para este pagamento</div>
    </div>`}
  `;
  $('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function fecharModal(){
  $('moverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharModal();});
</script>
